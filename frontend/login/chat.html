

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1014;
  --surface: #17181d;
  --surface2: #1e2028;
  --surface3: #24262f;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --text: #f0f0f2;
  --text-muted: #8b8d97;
  --text-dim: #4a4c58;
  --accent: #5b6af0;
  --accent-hover: #6e7cf2;
  --accent-dim: rgba(91,106,240,0.12);
  --danger: #e05c5c;
  --success: #4caf8a;
  --online: #4caf8a;
  --away: #e0c85c;
  --radius: 10px;
  --radius-sm: 6px;
  --sidebar-w: 280px;
  --nav-w: 60px;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
}

/* ── NAV RAIL ── */
.nav-rail {
  width: var(--nav-w);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 0;
  gap: 4px;
  flex-shrink: 0;
  z-index: 10;
}

.nav-logo {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  flex-shrink: 0;
}

.nav-logo svg { width: 18px; height: 18px; }

.nav-btn {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
  position: relative;
}

.nav-btn svg { width: 18px; height: 18px; }

.nav-btn:hover { background: var(--surface2); color: var(--text-muted); }
.nav-btn.active { background: var(--accent-dim); color: var(--accent); }

.nav-badge {
  display: none;
  position: absolute;
  top: 6px;
  right: 6px;
  width: 7px;
  height: 7px;
  background: var(--danger);
  border-radius: 50%;
  border: 2px solid var(--surface);
}

.nav-spacer { flex: 1; }

.nav-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--accent-dim);
  border: 2px solid var(--border2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  transition: border-color 0.15s;
  position: relative;
}

.nav-avatar:hover { border-color: var(--accent); }

.nav-avatar .status-dot {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 9px;
  height: 9px;
  background: var(--online);
  border-radius: 50%;
  border: 2px solid var(--surface);
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.sidebar-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  letter-spacing: -0.2px;
}

.search-wrap {
  position: relative;
}

.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: var(--text-dim);
  pointer-events: none;
}

.search-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 7px 10px 7px 32px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}

.search-input::placeholder { color: var(--text-dim); }
.search-input:focus { border-color: var(--border2); }

.sidebar-section-label {
  padding: 14px 16px 6px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-dim);
}

.contact-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px;
}

.contact-list::-webkit-scrollbar { width: 4px; }
.contact-list::-webkit-scrollbar-track { background: transparent; }
.contact-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.contact-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
}

.contact-item:hover { background: var(--surface2); }
.contact-item.active { background: var(--accent-dim); }
.contact-item.active .contact-name { color: var(--text); }

.contact-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  position: relative;
}

.contact-avatar .dot {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 2px solid var(--surface);
}

.dot.online { background: var(--online); }
.dot.away { background: var(--away); }
.dot.offline { background: var(--text-dim); }

.contact-info { flex: 1; min-width: 0; }

.contact-name {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.contact-preview {
  font-size: 12px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.contact-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}

.contact-time {
  font-size: 11px;
  color: var(--text-dim);
}

.unread-badge {
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  border-radius: 10px;
  padding: 1px 6px;
  min-width: 18px;
  text-align: center;
}

/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-dim);
}

.empty-icon {
  width: 56px;
  height: 56px;
  background: var(--surface2);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 4px;
}

.empty-icon svg { width: 26px; height: 26px; color: var(--text-dim); }

.empty-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-muted);
}

.empty-sub {
  font-size: 13px;
  color: var(--text-dim);
  text-align: center;
  max-width: 220px;
  line-height: 1.5;
}

/* Chat area */
.chat-area { display: none; flex-direction: column; height: 100%; }
.chat-area.visible { display: flex; }

.chat-header {
  padding: 0 20px;
  height: 56px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.chat-header-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
}

.chat-header-info { flex: 1; }
.chat-header-name { font-size: 14px; font-weight: 600; color: var(--text); }
.chat-header-status { font-size: 12px; color: var(--text-dim); }

.chat-header-actions { display: flex; gap: 4px; }

.icon-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
}

.icon-btn svg { width: 16px; height: 16px; }
.icon-btn:hover { background: var(--surface2); color: var(--text-muted); }

.messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.messages-area::-webkit-scrollbar { width: 4px; }
.messages-area::-webkit-scrollbar-track { background: transparent; }
.messages-area::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.msg-date-divider {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  margin: 12px 0 8px;
  position: relative;
}

.msg-date-divider::before, .msg-date-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: calc(50% - 50px);
  height: 1px;
  background: var(--border);
}

.msg-date-divider::before { left: 0; }
.msg-date-divider::after { right: 0; }

.msg-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 100%;
}

.msg-row.mine { flex-direction: row-reverse; }

.msg-avatar-sm {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  margin-bottom: 2px;
}

.msg-bubble {
  max-width: 420px;
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.5;
  position: relative;
  word-break: break-word;
}

.msg-row:not(.mine) .msg-bubble {
  background: var(--surface2);
  color: var(--text);
  border-bottom-left-radius: 3px;
}

.msg-row.mine .msg-bubble {
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 3px;
}

.msg-time {
  font-size: 10.5px;
  color: var(--text-dim);
  margin-top: 3px;
  text-align: right;
  padding: 0 4px;
}

.msg-row.mine .msg-time { text-align: left; }

.chat-input-area {
  padding: 12px 16px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 8px 6px 14px;
  transition: border-color 0.15s;
}

.input-row:focus-within { border-color: var(--border2); }

.msg-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  color: var(--text);
  resize: none;
  max-height: 100px;
  line-height: 1.5;
}

.msg-input::placeholder { color: var(--text-dim); }

.send-btn {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border: none;
  border-radius: 7px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, transform 0.1s;
  flex-shrink: 0;
}

.send-btn:hover { background: var(--accent-hover); }
.send-btn:active { transform: scale(0.93); }
.send-btn svg { width: 15px; height: 15px; color: #fff; }

/* ── OVERLAYS ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.15s ease;
}

.overlay.open { display: flex; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  width: 100%;
  animation: slideUp 0.2s ease;
}

@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
}

.modal-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }

.close-btn {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
}

.close-btn:hover { background: var(--surface2); color: var(--text-muted); }
.close-btn svg { width: 15px; height: 15px; }

/* ── PROFILE MODAL ── */
#profile-modal .modal { max-width: 400px; }

.profile-hero {
  padding: 28px 24px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}

.profile-avatar-lg {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--accent-dim);
  border: 3px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  font-weight: 600;
  color: var(--accent);
  position: relative;
  cursor: pointer;
}

.avatar-edit-hint {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.15s;
}

.profile-avatar-lg:hover .avatar-edit-hint { opacity: 1; }
.avatar-edit-hint svg { width: 18px; height: 18px; color: #fff; }

.profile-name-display {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.profile-email-display {
  font-size: 12.5px;
  color: var(--text-muted);
  margin-top: -6px;
}

.profile-status-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--text-muted);
}

.profile-status-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--online); }

.profile-fields { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 14px; }

.profile-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.profile-field input,
.profile-field textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  resize: none;
}

.profile-field input:focus,
.profile-field textarea:focus { border-color: var(--border2); }

.profile-field input[readonly],
.profile-field textarea[readonly] { color: var(--text-muted); cursor: default; }

.profile-actions {
  padding: 0 20px 20px;
  display: flex;
  gap: 8px;
}

.btn-primary {
  flex: 1;
  padding: 9px 0;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}

.btn-primary:hover { background: var(--accent-hover); }

.btn-secondary {
  padding: 9px 16px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}

.btn-secondary:hover { background: var(--surface2); }

/* ── REQUESTS MODAL ── */
#requests-modal .modal { max-width: 420px; }

.requests-list { padding: 8px 12px 16px; display: flex; flex-direction: column; gap: 4px; max-height: 400px; overflow-y: auto; }

.request-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 10px;
  border-radius: var(--radius-sm);
  transition: background 0.12s;
}

.request-item:hover { background: var(--surface2); }

.request-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
}

.request-info { flex: 1; min-width: 0; }
.request-name { font-size: 13.5px; font-weight: 500; color: var(--text); }
.request-meta { font-size: 12px; color: var(--text-dim); margin-top: 1px; }

.request-btns { display: flex; gap: 6px; }

.req-accept {
  padding: 5px 12px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s;
}

.req-accept:hover { background: var(--accent-hover); }

.req-decline {
  padding: 5px 10px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: 12.5px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s;
}

.req-decline:hover { background: var(--surface2); }

.empty-requests {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}

/* toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 8px;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
</style>
</head>
<body>

<!-- NAV RAIL -->
<nav class="nav-rail">
  <div class="nav-logo">
    <svg viewBox="0 0 18 18" fill="none"><path d="M3 13.5C3 13.5 4.5 10.5 9 10.5C13.5 10.5 15 13.5 15 13.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/><circle cx="9" cy="6.5" r="3" stroke="white" stroke-width="1.8"/></svg>
  </div>

  <button class="nav-btn active" title="Chats" onclick="setNav(this)">
    <svg viewBox="0 0 20 20" fill="none"><path d="M2 5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6l-4 3V5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
  </button>

  <button class="nav-btn" title="Friend Requests" onclick="openRequests()">
    <svg viewBox="0 0 20 20" fill="none"><circle cx="8" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 17c0-3.314 2.686-6 6-6M14 11v6M11 14h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span class="nav-badge"></span>
  </button>

  <button class="nav-btn" title="Settings" onclick="setNav(this)">
    <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
  </button>

  <div class="nav-spacer"></div>

  <div class="nav-avatar" onclick="openProfile()" title="Your profile">
    AJ
    <span class="status-dot"></span>
  </div>
  <button class="nav-btn" title="Logout" onclick="logout()">
    <svg viewBox="0 0 20 20" fill="none"><path d="M7 3H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h3M13 14l4-4-4-4M17 10H7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</nav>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Messages</div>
    <div class="search-wrap">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input class="search-input" type="text" placeholder="Search conversations…">
    </div>
  </div>

  <div class="sidebar-section-label">Recent</div>

  <div class="contact-list">
    <!-- contacts injected by JS -->
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <!-- Empty state -->
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H7l-4 3V6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </div>
    <div class="empty-title">No conversation open</div>
    <div class="empty-sub">Pick someone from the sidebar to start chatting</div>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chat-area">
    <div class="chat-header">
      <div class="chat-header-avatar" id="chat-avatar"></div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="chat-name"></div>
        <div class="chat-header-status" id="chat-status"></div>
      </div>
      <div class="chat-header-actions">
        <button class="icon-btn" title="Search in chat">
          <svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" title="More options">
          <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="4" r="1" fill="currentColor"/><circle cx="8" cy="8" r="1" fill="currentColor"/><circle cx="8" cy="12" r="1" fill="currentColor"/></svg>
        </button>
      </div>
    </div>

    <div class="messages-area" id="messages-area">
      <!-- messages injected by JS -->
    </div>

    <div class="chat-input-area">
      <div class="input-row">
        <textarea class="msg-input" id="msg-input" rows="1" placeholder="Message…" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 16 16" fill="none"><path d="M14 2L2 7l5 2 2 5 5-12z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </div>

</main>

<!-- PROFILE MODAL -->
<div class="overlay" id="profile-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Your Profile</span>
      <button class="close-btn" onclick="closeModal('profile-modal')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="profile-hero">
      <div class="profile-avatar-lg">
        AJ
        <div class="avatar-edit-hint">
          <svg viewBox="0 0 16 16" fill="none"><path d="M11 2l3 3-9 9H2v-3L11 2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="profile-name-display" id="profile-name-display">Alex Johnson</div>
      <div class="profile-email-display">alex@example.com</div>
      <div class="profile-status-chip"><span class="dot"></span> Online</div>
    </div>

    <div class="profile-fields">
      <div class="profile-field">
        <label>Username</label>
        <input type="text" value="alex.j" readonly id="profile-username">
      </div>
      <div class="profile-field">
        <label>Email</label>
        <input type="email" value="alex@example.com" readonly id="profile-email">
      </div>
      <div class="profile-field">
        <label>About me</label>
        <textarea rows="3" placeholder="Write something about yourself…" id="profile-about"></textarea>
      </div>
    </div>

    <div class="profile-actions">
      <button class="btn-secondary" onclick="logout()">Logout</button>
      <button class="btn-secondary" onclick="closeModal('profile-modal')">Cancel</button>
      <button id="save-btn" class="btn-primary" onclick="saveProfile()" disabled style="opacity:0.45;cursor:not-allowed">Save changes</button>
    </div>
  </div>
</div>

<!-- REQUESTS MODAL -->
<div class="overlay" id="requests-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Friend Requests</span>
      <button class="close-btn" onclick="closeModal('requests-modal')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="requests-list" id="requests-list"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script>
let originalAbout = '';
let ws;
let currentUsername; // store logged in username


const API = 'http://127.0.0.1:8000';
    document.addEventListener("DOMContentLoaded",async ()=>{
        const token=localStorage.getItem("token");

        let res=await fetch(`${API}/session/${token}`);

        if(!res.ok){
            location.href="./index.html";   
        }
        res = await fetch(`${API}/me/${token}`);
        let data = await res.json();
        if (!data) return;
        currentUsername = data.username;
        connectWebSocket(token);

        document.querySelector('.nav-avatar').childNodes[0].textContent = data.username.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();


        const countRes = await fetch(`${API}/request_notification/${token}`);
        const countData = await countRes.json();
        updateRequestBadge(countData.requests_count);
    });

//------ websocket ------
function connectWebSocket(token) {
  ws = new WebSocket(`ws://127.0.0.1:8000/pulse/${token}`);
  
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    
    if (msg.type === 'request_receive') {
      // someone sent us a request, increment badge
      const badge = document.querySelector('.nav-badge');
      const current = parseInt(badge.textContent) || 0;
      updateRequestBadge(current + 1);
    }
    
    if (msg.type === 'request_send') {
      if (msg.reason === 'success') showToast('Request sent');
      else if (msg.reason === 'request_exists') showToast('Request already sent');
      else if (msg.reason === 'already_friend') showToast('Already friends');
      else if (msg.reason === 'user_no_exist') showToast('User not found');
    }
    
    if (msg.type === 'request') {
      if (msg.status === 'accepted') showToast(`${msg.username} accepted your request`);
    }
  };

  ws.onclose = () => {
    // reconnect after 3s if disconnected
    setTimeout(() => connectWebSocket(token), 3000);
  };
}
// ── MOCK DATA ──
const avatarColors = [
  ['#3b4fd4','#c7cbf9'],['#2e7d5e','#a8d5c2'],['#8b3a3a','#f5c2c2'],
  ['#5a3e8a','#d0bbf5'],['#8a5a1a','#f5d8a0'],['#1a5a8a','#a0d4f5'],
];

const contacts = [
  { id:1, name:'Priya Sharma',    username:'priya.s',   status:'online', preview:'sounds good!',           time:'2m',  unread:3,  color:0 },
  { id:2, name:'Rohan Mehta',     username:'rohan_m',   status:'online', preview:'can u send the file?',   time:'18m', unread:0,  color:1 },
  { id:3, name:'Sara Kim',        username:'sara.kim',  status:'away',   preview:'ok see u tmrw',          time:'1h',  unread:1,  color:2 },
  { id:4, name:'Dev Patel',       username:'devp',      status:'offline',preview:'👍',                     time:'3h',  unread:0,  color:3 },
  { id:5, name:'Aisha Noor',      username:'aisha.n',   status:'online', preview:'haha yeah exactly',      time:'yday',unread:0,  color:4 },
  { id:6, name:'Carlos Reyes',    username:'c.reyes',   status:'offline',preview:'let me check and get back',time:'yday',unread:0, color:5 },
  
];

const requests = [
  { id:1, name:'Meera Iyer',   username:'meera.i',  time:'2 hours ago',  color:2 },
  { id:2, name:'Arjun Das',    username:'arjun_d',  time:'yesterday',    color:3 },
];

const mockMessages = {
  1:[
    { from:'them', text:'hey! are you free this evening?', time:'6:30 PM' },
    { from:'me',   text:'yeah should be free after 7', time:'6:31 PM' },
    { from:'them', text:'perfect, let\'s catch up then', time:'6:31 PM' },
    { from:'me',   text:'sounds good!', time:'6:32 PM' },
    { from:'them', text:'sounds good!', time:'6:33 PM' },
  ],
  2:[
    { from:'me',   text:'hey rohan, can you send the design files?', time:'11:00 AM' },
    { from:'them', text:'sure, one sec', time:'11:02 AM' },
    { from:'them', text:'can u send the file?', time:'11:05 AM' },
  ],
};

let activeContact = null;

// ── RENDER CONTACTS ──
function initials(name) { return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

function renderContacts() {
  const list = document.querySelector('.contact-list');
  list.innerHTML = contacts.map(c => {
    const [bg, fg] = avatarColors[c.color];
    return `
    <div class="contact-item" id="contact-${c.id}" onclick="openChat(${c.id})">
      <div class="contact-avatar" style="background:${bg}20;color:${fg}">
        ${initials(c.name)}
        <span class="dot ${c.status}"></span>
      </div>
      <div class="contact-info">
        <div class="contact-name">${c.name}</div>
        <div class="contact-preview">${c.preview}</div>
      </div>
      <div class="contact-meta">
        <span class="contact-time">${c.time}</span>
        ${c.unread ? `<span class="unread-badge">${c.unread}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── OPEN CHAT ──
function openChat(id) {
  activeContact = contacts.find(c => c.id === id);
  document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`contact-${id}`)?.classList.add('active');

  const [bg, fg] = avatarColors[activeContact.color];
  const avatar = document.getElementById('chat-avatar');
  avatar.textContent = initials(activeContact.name);
  avatar.style.background = `${bg}20`;
  avatar.style.color = fg;
  avatar.style.width = '32px';
  avatar.style.height = '32px';

  document.getElementById('chat-name').textContent = activeContact.name;
  document.getElementById('chat-status').textContent =
    activeContact.status === 'online' ? '● Online' :
    activeContact.status === 'away'   ? '◐ Away' : '○ Offline';
  document.getElementById('chat-status').style.color =
    activeContact.status === 'online' ? 'var(--online)' :
    activeContact.status === 'away'   ? 'var(--away)' : 'var(--text-dim)';

  // clear unread
  activeContact.unread = 0;
  renderContacts();
  document.getElementById(`contact-${id}`)?.classList.add('active');

  renderMessages(id);

  document.getElementById('empty-state').style.display = 'none';
  const ca = document.getElementById('chat-area');
  ca.style.display = 'flex';
  ca.classList.add('visible');
}

function renderMessages(id) {
  const area = document.getElementById('messages-area');
  const msgs = mockMessages[id] || [];
  if (!msgs.length) { area.innerHTML = `<div style="text-align:center;color:var(--text-dim);font-size:13px;margin-top:40px">No messages yet. Say hi!</div>`; return; }

  area.innerHTML = `<div class="msg-date-divider">Today</div>` + msgs.map(m => {
    const isMine = m.from === 'me';
    const [bg, fg] = avatarColors[activeContact.color];
    const theirAvatar = `<div class="msg-avatar-sm" style="background:${bg}20;color:${fg}">${initials(activeContact.name)}</div>`;
    return `
    <div class="msg-row ${isMine ? 'mine' : ''}">
      ${!isMine ? theirAvatar : ''}
      <div>
        <div class="msg-bubble">${m.text}</div>
        <div class="msg-time">${m.time}</div>
      </div>
    </div>`;
  }).join('');

  area.scrollTop = area.scrollHeight;
}

// ── SEND MESSAGE ──
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !activeContact) return;

  const now = new Date();
  const time = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  if (!mockMessages[activeContact.id]) mockMessages[activeContact.id] = [];
  mockMessages[activeContact.id].push({ from:'me', text, time });

  activeContact.preview = text;
  activeContact.time = 'now';
  renderContacts();
  document.getElementById(`contact-${activeContact.id}`)?.classList.add('active');
  renderMessages(activeContact.id);
  input.value = '';
  input.style.height = 'auto';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// auto-grow textarea
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// ── PROFILE ──


async function openProfile() {
  const res = await fetch(`${API}/me/${localStorage.getItem('token')}`);
  if (!res.ok) return; // apiFetch handles 401 redirect

  const data = await res.json();
  // populate the modal fields
  document.getElementById('profile-name-display').textContent = data.username;
  document.getElementById('profile-email').value = data.email;
  document.getElementById('profile-username').value = data.username;
  document.getElementById('profile-about').value = data.about ?? '';
originalAbout = data.about ?? '';

  // open modal after data is ready
  document.querySelector('.profile-email-display').textContent = formatJoinDate(data.creation_date);
  document.querySelector('.profile-avatar-lg').childNodes[0].textContent = initials(data.username);
  document.getElementById('profile-modal').classList.add('open');
}

document.getElementById('profile-about').addEventListener('input', function() {
  const changed = this.value.trim() !== originalAbout.trim();
  const btn = document.getElementById('save-btn');
  btn.disabled = !changed;
  btn.style.opacity = changed ? '1' : '0.45';
  btn.style.cursor = changed ? 'pointer' : 'not-allowed';
});

function formatJoinDate(dateStr) {
  const date = new Date(dateStr);
  return 'Joined on ' + date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}



async function saveProfile() {
  const about = document.getElementById('profile-about').value.trim();

  const res = await fetch(`${API}/update_about/${localStorage.getItem('token')}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ about })
  });
  
  if (!res) return;
  closeModal('profile-modal');
  showToast('Profile saved');
  originalAbout = document.getElementById('profile-about').value.trim();
const btn = document.getElementById('save-btn');
btn.disabled = true;
btn.style.opacity = '0.45';
btn.style.cursor = 'not-allowed';
}


// ── LOGOUT ──
async function logout() {
  const token = localStorage.getItem('token');
  await fetch(`${API}/logout/${token}`);
  localStorage.removeItem('token');
  window.location.href = './index.html';
}


// ── REQUESTS ──
function renderRequests(data) {
  const list = document.getElementById('requests-list');
  if (!data || !data.length) {
    list.innerHTML = `<div class="empty-requests">No pending requests</div>`;
    return;
  }
  list.innerHTML = data.map((r, i) => {
    const [bg, fg] = avatarColors[i % avatarColors.length];
    return `
    <div class="request-item" id="req-${r.id}">
      <div class="request-avatar" style="background:${bg}20;color:${fg}">${r.sender.slice(0,2).toUpperCase()}</div>
      <div class="request-info">
        <div class="request-name">${r.sender}</div>
        <div class="request-meta">${r.req_time}</div>
      </div>
      <div class="request-btns">
        <button class="req-accept" onclick="acceptReq(${r[0]}, '${r[1]}')">Accept</button>
        <button class="req-decline" onclick="declineReq(${r[0]}, '${r[1]}')">Decline</button>
      </div>
    </div>`;
  }).join('');
}

function updateRequestBadge(count) {
  const badge = document.querySelector('.nav-badge');
  if (count > 0) {
    badge.textContent = count > 99 ? '99+' : count;
    badge.style.width = 'auto';
    badge.style.minWidth = '16px';
    badge.style.height = '16px';
    badge.style.borderRadius = '8px';
    badge.style.fontSize = '9px';
    badge.style.fontWeight = '600';
    badge.style.color = '#fff';
    badge.style.padding = '0 4px';
    badge.style.top = '4px';
    badge.style.right = '4px';
    badge.style.display='unset'
  } else {
    badge.textContent = '';
    badge.style.width = '7px';
    badge.style.minWidth = 'unset';
    badge.style.height = '7px';
    badge.style.borderRadius = '50%';
    badge.style.padding = '0';
    badge.style.top = '6px';
    badge.style.right = '6px';
    badge.style.display='none'
  }
}

async function openRequests() {
  const token = localStorage.getItem('token');
  const res = await fetch(`${API}/requests_list/${token}`);
  const data = await res.json();
  // replace mock requests with real data
  renderRequests(data.requests);
  document.getElementById('requests-modal').classList.add('open');
  // clear badge since they've now seen requests
  updateRequestBadge(0);
}

function acceptReq(id, senderUsername) {
  ws.send(JSON.stringify({ type: 'request', id, username: senderUsername, status: 'accept' }));
  document.getElementById(`req-${id}`)?.remove();
  const remaining = document.querySelectorAll('.request-item').length;
  if (!remaining) document.getElementById('requests-list').innerHTML = `<div class="empty-requests">No pending requests</div>`;
}

function declineReq(id, senderUsername) {
  ws.send(JSON.stringify({ type: 'request', id, username: senderUsername, status: 'decline' }));
  document.getElementById(`req-${id}`)?.remove();
  const remaining = document.querySelectorAll('.request-item').length;
  if (!remaining) document.getElementById('requests-list').innerHTML = `<div class="empty-requests">No pending requests</div>`;
}

// ── UTILS ──
function setNav(btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ──
renderContacts();
</script>
</body>
</html>
