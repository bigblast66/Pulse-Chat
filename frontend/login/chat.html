<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1014;
  --surface: #17181d;
  --surface2: #1e2028;
  --surface3: #24262f;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --text: #f0f0f2;
  --text-muted: #8b8d97;
  --text-dim: #4a4c58;
  --accent: #5b6af0;
  --accent-hover: #6e7cf2;
  --accent-dim: rgba(91,106,240,0.12);
  --danger: #e05c5c;
  --success: #4caf8a;
  --online: #4caf8a;
  --away: #e0c85c;
  --radius: 10px;
  --radius-sm: 6px;
  --sidebar-w: 280px;
  --nav-w: 60px;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
}

/* NAV RAIL */
.nav-rail {
  width: var(--nav-w);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 0;
  gap: 4px;
  flex-shrink: 0;
  z-index: 10;
}

.nav-logo {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  flex-shrink: 0;
}

.nav-logo svg { width: 18px; height: 18px; }

.nav-btn {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
  position: relative;
}

.nav-btn svg { width: 18px; height: 18px; }
.nav-btn:hover { background: var(--surface2); color: var(--text-muted); }
.nav-btn.active { background: var(--accent-dim); color: var(--accent); }

.nav-badge {
  display: none;
  position: absolute;
  top: 6px;
  right: 6px;
  width: 7px;
  height: 7px;
  background: var(--danger);
  border-radius: 50%;
  border: 2px solid var(--surface);
}

.nav-spacer { flex: 1; }

.nav-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--accent-dim);
  border: 2px solid var(--border2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  transition: border-color 0.15s;
  position: relative;
}

.nav-avatar:hover { border-color: var(--accent); }

.nav-avatar .status-dot {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 9px;
  height: 9px;
  background: var(--online);
  border-radius: 50%;
  border: 2px solid var(--surface);
}

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.sidebar-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  letter-spacing: -0.2px;
}

.search-wrap { position: relative; }

.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: var(--text-dim);
  pointer-events: none;
}

.search-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 7px 10px 7px 32px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}

.search-input::placeholder { color: var(--text-dim); }
.search-input:focus { border-color: var(--border2); }

.sidebar-section-label {
  padding: 14px 16px 6px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-dim);
}

.contact-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px;
}

.contact-list::-webkit-scrollbar { width: 4px; }
.contact-list::-webkit-scrollbar-track { background: transparent; }
.contact-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.contact-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
}

.contact-item:hover { background: var(--surface2); }
.contact-item.active { background: var(--accent-dim); }
.contact-item.active .contact-name { color: var(--text); }

.contact-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  position: relative;
}

.contact-info { flex: 1; min-width: 0; }

.contact-name {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.contact-preview {
  font-size: 12px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.contact-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}

.contact-time { font-size: 11px; color: var(--text-dim); }

.unread-badge {
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  border-radius: 10px;
  padding: 1px 6px;
  min-width: 18px;
  text-align: center;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-dim);
}

.empty-icon {
  width: 56px;
  height: 56px;
  background: var(--surface2);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 4px;
}

.empty-icon svg { width: 26px; height: 26px; color: var(--text-dim); }
.empty-title { font-size: 15px; font-weight: 600; color: var(--text-muted); }
.empty-sub { font-size: 13px; color: var(--text-dim); text-align: center; max-width: 220px; line-height: 1.5; }

.chat-area { display: none; flex-direction: column; height: 100%; }
.chat-area.visible { display: flex; }

.chat-header {
  padding: 0 20px;
  height: 56px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.chat-header-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
}

.chat-header-info { flex: 1; }
.chat-header-name { font-size: 14px; font-weight: 600; color: var(--text); }
.chat-header-status { font-size: 12px; color: var(--text-dim); }
.chat-header-actions { display: flex; gap: 4px; }

.icon-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
}

.icon-btn svg { width: 16px; height: 16px; }
.icon-btn:hover { background: var(--surface2); color: var(--text-muted); }

.messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.messages-area::-webkit-scrollbar { width: 4px; }
.messages-area::-webkit-scrollbar-track { background: transparent; }
.messages-area::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.load-more-btn {
  align-self: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-muted);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  padding: 5px 14px;
  cursor: pointer;
  margin-bottom: 8px;
  transition: background 0.15s;
}
.load-more-btn:hover { background: var(--surface3); }

.msg-date-divider {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  margin: 12px 0 8px;
  position: relative;
}

.msg-date-divider::before, .msg-date-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: calc(50% - 50px);
  height: 1px;
  background: var(--border);
}

.msg-date-divider::before { left: 0; }
.msg-date-divider::after { right: 0; }

.msg-row { display: flex; gap: 8px; align-items: flex-end; max-width: 100%; }
.msg-row.mine { flex-direction: row-reverse; }

.msg-avatar-sm {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  margin-bottom: 2px;
}

.msg-bubble {
  max-width: 420px;
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.5;
  word-break: break-word;
}

.msg-row:not(.mine) .msg-bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 3px; }
.msg-row.mine .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 3px; }

.msg-time { font-size: 10.5px; color: var(--text-dim); margin-top: 3px; text-align: right; padding: 0 4px; }
.msg-row.mine .msg-time { text-align: left; }

.chat-input-area {
  padding: 12px 16px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 8px 6px 14px;
  transition: border-color 0.15s;
}

.input-row:focus-within { border-color: var(--border2); }

.msg-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  color: var(--text);
  resize: none;
  max-height: 100px;
  line-height: 1.5;
}

.msg-input::placeholder { color: var(--text-dim); }

.send-btn {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border: none;
  border-radius: 7px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, transform 0.1s;
  flex-shrink: 0;
}

.send-btn:hover { background: var(--accent-hover); }
.send-btn:active { transform: scale(0.93); }
.send-btn svg { width: 15px; height: 15px; color: #fff; }

/* OVERLAYS */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.15s ease;
}

.overlay.open { display: flex; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  width: 100%;
  animation: slideUp 0.2s ease;
}

@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
}

.modal-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }

.close-btn {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
}

.close-btn:hover { background: var(--surface2); color: var(--text-muted); }
.close-btn svg { width: 15px; height: 15px; }

/* PROFILE MODAL */
#profile-modal .modal { max-width: 400px; }

.profile-hero {
  padding: 28px 24px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}

.profile-avatar-lg {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--accent-dim);
  border: 3px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  font-weight: 600;
  color: var(--accent);
  position: relative;
  cursor: pointer;
}

.avatar-edit-hint {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.15s;
}

.profile-avatar-lg:hover .avatar-edit-hint { opacity: 1; }
.avatar-edit-hint svg { width: 18px; height: 18px; color: #fff; }

.profile-name-display { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.profile-email-display { font-size: 12.5px; color: var(--text-muted); margin-top: -6px; }

.profile-status-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--text-muted);
}

.profile-status-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--online); }

.profile-fields { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 14px; }

.profile-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.profile-field input,
.profile-field textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  resize: none;
}

.profile-field input:focus,
.profile-field textarea:focus { border-color: var(--border2); }
.profile-field input[readonly] { color: var(--text-muted); cursor: default; }

.profile-actions { padding: 0 20px 20px; display: flex; gap: 8px; }

.btn-primary {
  flex: 1;
  padding: 9px 0;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}

.btn-primary:hover { background: var(--accent-hover); }

.btn-secondary {
  padding: 9px 16px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}

.btn-secondary:hover { background: var(--surface2); }

/* REQUESTS MODAL */
#requests-modal .modal { max-width: 420px; }

.req-tabs { display: flex; border-bottom: 1px solid var(--border); }

.req-tab {
  flex: 1;
  padding: 10px 0;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.req-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.requests-list {
  padding: 8px 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 340px;
  overflow-y: auto;
}

.request-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px;
  border-radius: var(--radius-sm);
  transition: background 0.12s;
}

.request-item:hover { background: var(--surface2); }

.request-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
}

.request-info { flex: 1; min-width: 0; }
.request-name { font-size: 13.5px; font-weight: 500; color: var(--text); }
.request-meta { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
.request-btns { display: flex; gap: 6px; }

.req-accept {
  padding: 5px 12px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s;
}

.req-accept:hover { background: var(--accent-hover); }

.req-decline {
  padding: 5px 10px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: 12.5px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s;
}

.req-decline:hover { background: var(--surface2); }

.empty-requests { padding: 40px 20px; text-align: center; color: var(--text-dim); font-size: 13px; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 8px;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
.toast.danger .toast-dot { background: var(--danger); }

/* CHAT SEARCH PANEL */
.chat-search-bar {
  display: none;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}
.chat-search-bar.visible { display: flex; }
.chat-search-bar input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.chat-search-bar input:focus { border-color: var(--border2); }
.chat-search-bar input::placeholder { color: var(--text-dim); }
.chat-search-nav { display: flex; align-items: center; gap: 4px; }
.chat-search-count { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
.search-highlight {
  background: rgba(91,106,240,0.35);
  border-radius: 2px;
  color: #fff;
}
.msg-row.search-match .msg-bubble { outline: 1px solid var(--accent); outline-offset: 2px; border-radius: 12px; }

/* SIDEBAR SEARCH RESULTS */
.sidebar-section-label.search-label { color: var(--accent); }
.contact-item.search-result-item .contact-preview { color: var(--text-muted); }
</style>
</head>
<body>

<!-- NAV RAIL -->
<nav class="nav-rail">
  <div class="nav-logo">
    <svg viewBox="0 0 18 18" fill="none"><path d="M3 13.5C3 13.5 4.5 10.5 9 10.5C13.5 10.5 15 13.5 15 13.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/><circle cx="9" cy="6.5" r="3" stroke="white" stroke-width="1.8"/></svg>
  </div>

  <button class="nav-btn active" title="Chats" onclick="setNav(this)">
    <svg viewBox="0 0 20 20" fill="none"><path d="M2 5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6l-4 3V5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
  </button>

  <button class="nav-btn" title="Friend Requests" onclick="openRequests()">

<!-- Toast -->
<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script>
// const API = 'http://127.0.0.1:8000';
const API = 'https://pulse-chat-4132.onrender.com';

let ws;
let currentUsername;
let originalAbout = '';
let activeReqTab = 'incoming';
let requestCount = 0;

// ── SIDEBAR STATE ──
// Map of chat_id -> { username, chat_id, sender, content, sent_at, last_id, unread_count, colorIdx }
const sidebarMap = new Map();
let sidebarOldestId = 999999999;
let sidebarLoadingMore = false;
let sidebarAllLoaded = false;

// ── ACTIVE CHAT STATE ──
// { username, chat_id, colorIdx, messages: [{id,sender,content,sent_at}], oldestId, hasMore }
let activeChat = null;

const avatarColors = [
  ['#3b4fd4','#c7cbf9'],['#2e7d5e','#a8d5c2'],['#8b3a3a','#f5c2c2'],
  ['#5a3e8a','#d0bbf5'],['#8a5a1a','#f5d8a0'],['#1a5a8a','#a0d4f5'],
];

function getColorIdx(username) {
  let h = 0;
  for (let i = 0; i < username.length; i++) h = (h * 31 + username.charCodeAt(i)) & 0xfffffff;
  return h % avatarColors.length;
}

function initials(name) { return (name || '??').slice(0, 2).toUpperCase(); }

function formatTime(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr.endsWith('Z') ? dateStr : dateStr + 'Z');
  const now = new Date();
  const diffMin = Math.floor((now - d) / 60000);
  if (diffMin < 1) return 'now';
  if (diffMin < 60) return `${diffMin}m`;
  const diffH = Math.floor(diffMin / 60);
  if (diffH < 24) return `${diffH}h`;
  const diffD = Math.floor(diffH / 24);
  if (diffD === 1) return 'yday';
  if (diffD < 7) return `${diffD}d`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatMsgTime(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr.endsWith('Z') ? dateStr : dateStr + 'Z');
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatMsgDate(dateStr) {
  if (!dateStr) return 'Today';
  const d = new Date(dateStr.endsWith('Z') ? dateStr : dateStr + 'Z');
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const msgDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diffD = Math.round((today - msgDay) / 86400000);
  if (diffD === 0) return 'Today';
  if (diffD === 1) return 'Yesterday';
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', async () => {
  // const token = localStorage.getItem('token');

  const sessionRes = await fetch(`${API}/session`,{credentials:'include'});
  if (!sessionRes.ok) { location.href = './index.html'; return; }

  const meRes = await fetch(`${API}/me`,{credentials:'include'});
  const me = await meRes.json();
  if (!me) return;

  currentUsername = me.username;
  document.querySelector('.nav-avatar').childNodes[0].textContent = me.username.slice(0, 2).toUpperCase();

  const countRes = await fetch(`${API}/request_notification`,{credentials:'include'});
  const countData = await countRes.json();
  requestCount = countData.requests_count;
  updateRequestBadge(requestCount);

  await loadSidebar();
  connectWebSocket(token);

  document.getElementById('contact-list').addEventListener('scroll', onSidebarScroll);

  // Restore chat from URL on refresh
  const params = new URLSearchParams(window.location.search);
  const chatIdFromUrl = params.get('c');
  if (chatIdFromUrl) {
    // Wait until sidebar is populated then open
    const tryOpen = () => {
      if (sidebarMap.has(chatIdFromUrl)) openChat(chatIdFromUrl);
    };
    tryOpen();
    // If not loaded yet (e.g. paginated), try again after first render
    setTimeout(tryOpen, 400);
  }
});

// ── SIDEBAR LOADING ──
async function loadSidebar() {
  if (sidebarLoadingMore || sidebarAllLoaded) return;
  sidebarLoadingMore = true;
  // const token = localStorage.getItem('token');
  try {
    const res = await fetch(`${API}/load_sidebar/${sidebarOldestId}`,{credentials:'include'});
    if (!res.ok) return;
    const rows = await res.json();
    if (!rows || !rows.length) { sidebarAllLoaded = true; return; }

    for (const row of rows) {
      // [user2, chat_id, sender, content, sent_at, last_id, unread_count]
      const [username, chat_id, sender, content, sent_at, last_id, unread_count] = row;
      if (!sidebarMap.has(chat_id)) {
        sidebarMap.set(chat_id, {
          username, chat_id, sender, content, sent_at,
          last_id: last_id ?? 0,
          unread_count: unread_count ?? 0,
          colorIdx: getColorIdx(username)
        });
      }
    }

    // Update oldest id — rows ordered by last_id DESC, pick smallest non-null
    const validIds = rows.map(r => r[5]).filter(id => id !== null);
    if (validIds.length) sidebarOldestId = Math.min(...validIds);
    if (rows.length < 50) sidebarAllLoaded = true;

    renderSidebar();
  } finally {
    sidebarLoadingMore = false;
  }
}

function onSidebarScroll() {
  const el = document.getElementById('contact-list');
  if (el.scrollTop + el.clientHeight >= el.scrollHeight - 40) loadSidebar();
}

function renderSidebar() {
  const list = document.getElementById('contact-list');
  const sorted = [...sidebarMap.values()].sort((a, b) => (b.last_id || 0) - (a.last_id || 0));

  if (!sorted.length) {
    list.innerHTML = `<div style="padding:24px 12px;text-align:center;color:var(--text-dim);font-size:13px">No conversations yet</div>`;
    return;
  }

  list.innerHTML = sorted.map(c => {
    const [bg, fg] = avatarColors[c.colorIdx];
    const isActive = activeChat && activeChat.chat_id === c.chat_id;
    const previewPrefix = c.sender === currentUsername ? 'You: ' : '';
    const preview = c.content ? escapeHtml(c.content) : '—';
    return `
    <div class="contact-item${isActive ? ' active' : ''}" id="sidebar-${c.chat_id}" onclick="openChat('${c.chat_id}')">
      <div class="contact-avatar" style="background:${bg}20;color:${fg}">${initials(c.username)}</div>
      <div class="contact-info">
        <div class="contact-name">${escapeHtml(c.username)}</div>
        <div class="contact-preview">${previewPrefix}${preview}</div>
      </div>
      <div class="contact-meta">
        <span class="contact-time">${formatTime(c.sent_at)}</span>
        ${c.unread_count > 0 ? `<span class="unread-badge">${c.unread_count}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// Upsert a sidebar entry when a real-time message comes in
function upsertSidebarEntry(chat_id, username, sender, content, sent_at, msg_id, isIncoming) {
  if (sidebarMap.has(chat_id)) {
    const e = sidebarMap.get(chat_id);
    e.sender = sender;
    e.content = content;
    e.sent_at = sent_at;
    e.last_id = msg_id;
    if (isIncoming && !(activeChat && activeChat.chat_id === chat_id)) {
      e.unread_count = (e.unread_count || 0) + 1;
    }
  } else {
    // New friend just messaged — insert fresh entry
    sidebarMap.set(chat_id, {
      username, chat_id, sender, content, sent_at,
      last_id: msg_id,
      unread_count: isIncoming ? 1 : 0,
      colorIdx: getColorIdx(username)
    });
  }
  renderSidebar();
}

// ── OPEN CHAT ──
async function openChat(chat_id) {
  const entry = sidebarMap.get(chat_id);
  if (!entry) return;

  // If already open in this chat, do nothing
  if (activeChat && activeChat.chat_id === chat_id) return;

  // Push chat_id into URL so refresh restores it
  history.pushState({ chat_id }, '', `?c=${chat_id}`);

  activeChat = {
    username: entry.username,
    chat_id,
    colorIdx: entry.colorIdx,
    messages: [],
    oldestId: 999999999,
    hasMore: true,
    hasNewer: false
  };

  // Clear unread for this entry
  entry.unread_count = 0;
  renderSidebar();

  // Show chat panel
  document.getElementById('empty-state').style.display = 'none';
  const ca = document.getElementById('chat-area');
  ca.style.display = 'flex';
  ca.classList.add('visible');

  // Set header
  const [bg, fg] = avatarColors[entry.colorIdx];
  const avatar = document.getElementById('chat-avatar');
  avatar.textContent = initials(entry.username);
  avatar.style.cssText = `background:${bg}20;color:${fg};width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;`;
  document.getElementById('chat-name').textContent = entry.username;
  document.getElementById('chat-status').textContent = '';

  // Load first batch of messages
  document.getElementById('messages-area').innerHTML = '';
  await loadMoreMessages();

  const area = document.getElementById('messages-area');
  area.scrollTop = area.scrollHeight;

  // Mark as read
  if (activeChat.messages.length) {
    const latestId = activeChat.messages[activeChat.messages.length - 1].id;
    sendReadReceipt(chat_id, latestId);
  }

  document.getElementById('msg-input').focus();
}

// ── LOAD MESSAGES (paginated) ──
async function loadMoreMessages() {
  if (!activeChat || !activeChat.hasMore) return;
  // const token = localStorage.getItem('token');
  const { chat_id, oldestId } = activeChat;

  const res = await fetch(`${API}/load_chat/${oldestId}/${chat_id}`,{credentials:'include'});
  if (!res.ok) return;
  const rows = await res.json();
  // rows: [id, chat_id, sender, content, sent_at] ordered by id DESC
  if (!rows || !rows.length) {
    activeChat.hasMore = false;
    renderMessages();
    return;
  }

  // Reverse to get chronological order, then prepend to existing messages
  const newMsgs = rows
    .map(r => ({ id: r[0], chat_id: r[1], sender: r[2], content: r[3], sent_at: r[4] }))
    .reverse();

  activeChat.messages = [...newMsgs, ...activeChat.messages];
  // Smallest id among this batch = oldest we've seen
  activeChat.oldestId = rows[rows.length - 1][0];
  if (rows.length < 50) activeChat.hasMore = false;

  renderMessages();
}

async function loadOlderMessages() {
  if (!activeChat || !activeChat.hasMore) return;
  const area = document.getElementById('messages-area');
  const prevHeight = area.scrollHeight;
  await loadMoreMessages();
  // Keep user's scroll position
  area.scrollTop = area.scrollHeight - prevHeight;
}

// ── RENDER MESSAGES ──
function renderMessages(scrollToBottom = false) {
  if (!activeChat) return;
  const area = document.getElementById('messages-area');
  const wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;

  let html = '';

  if (activeChat.hasMore) {
    html += `<button class="load-more-btn" onclick="loadOlderMessages()">Load older messages</button>`;
  }

  let lastDateLabel = '';
  const [bg, fg] = avatarColors[activeChat.colorIdx];

  for (const m of activeChat.messages) {
    const dateLabel = formatMsgDate(m.sent_at);
    if (dateLabel !== lastDateLabel) {
      html += `<div class="msg-date-divider">${dateLabel}</div>`;
      lastDateLabel = dateLabel;
    }
    const isMine = m.sender === currentUsername;
    const theirAvatar = `<div class="msg-avatar-sm" style="background:${bg}20;color:${fg}">${initials(activeChat.username)}</div>`;
    html += `
    <div class="msg-row ${isMine ? 'mine' : ''}" data-id="${m.id}">
      ${!isMine ? theirAvatar : ''}
      <div>
        <div class="msg-bubble">${escapeHtml(m.content)}</div>
        <div class="msg-time">${formatMsgTime(m.sent_at)}</div>
      </div>
    </div>`;
  }

  if (!activeChat.messages.length && !activeChat.hasMore) {
    html = `<div style="text-align:center;color:var(--text-dim);font-size:13px;margin-top:40px">No messages yet. Say hi!</div>`;
  }

  if (activeChat.hasNewer) {
    html += `<button class="load-more-btn" onclick="loadNewerMessages()">Load newer messages</button>`;
  }

  area.innerHTML = html;

  if (scrollToBottom || wasAtBottom) {
    area.scrollTop = area.scrollHeight;
  }
}

async function loadNewerMessages() {
  if (!activeChat || !activeChat.hasNewer) return;
  // const token = localStorage.getItem('token');
  const { chat_id, messages } = activeChat;
  const newestId = messages[messages.length - 1].id;

  const res = await fetch(`${API}/load_chat_after/${newestId}/${chat_id}`,{credentials:'include'});
  if (!res.ok) return;
  const rows = await res.json();
  if (!rows || !rows.length) { activeChat.hasNewer = false; renderMessages(); return; }

  // rows come ASC (oldest first) — already correct order to append
  const newMsgs = rows.map(r => ({ id: r[0], chat_id: r[1], sender: r[2], content: r[3], sent_at: r[4] }));
  const area = document.getElementById('messages-area');
  const prevDistFromBottom = area.scrollHeight - area.scrollTop - area.clientHeight;

  activeChat.messages = [...activeChat.messages, ...newMsgs];
  if (newMsgs.length < 50) activeChat.hasNewer = false;

  renderMessages();
  // Keep distance from bottom the same
  area.scrollTop = area.scrollHeight - area.clientHeight - prevDistFromBottom;
}

// Scroll handler — load older at top, load newer at bottom
document.getElementById('messages-area').addEventListener('scroll', function () {
  if (this.scrollTop < 40 && activeChat?.hasMore) loadOlderMessages();
  if (this.scrollHeight - this.scrollTop - this.clientHeight < 40 && activeChat?.hasNewer) loadNewerMessages();
});

// ── SEND MESSAGE ──
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !activeChat || !ws || ws.readyState !== WebSocket.OPEN) return;

  ws.send(JSON.stringify({
    type: 'send_message',
    chat_id: activeChat.chat_id,
    username: activeChat.username,
    content: text
  }));

  input.value = '';
  input.style.height = 'auto';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

document.getElementById('msg-input').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// ── READ RECEIPT ──
function sendReadReceipt(chat_id, msg_id) {
  if (!ws || ws.readyState !== WebSocket.OPEN || !msg_id) return;
  ws.send(JSON.stringify({ type: 'update_read_receipt', id: msg_id, chat_id }));
}

// ── WEBSOCKET ──
function connectWebSocket(token) {
  ws = new WebSocket(`ws://127.0.0.1:8000/pulse/${token}`);

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    // ── OWN MESSAGE ECHOED BACK ──
    if (msg.type === 'sent_message') {
      const newMsg = { id: msg.id || Date.now(), chat_id: msg.chat_id, sender: msg.sender, content: msg.content, sent_at: msg.sent_at };
      if (activeChat && activeChat.chat_id === msg.chat_id) {
        activeChat.messages.push(newMsg);
        renderMessages(true);
        sendReadReceipt(msg.chat_id, newMsg.id);
      }
      const entry = sidebarMap.get(msg.chat_id);
      upsertSidebarEntry(msg.chat_id, entry ? entry.username : activeChat?.username, msg.sender, msg.content, msg.sent_at, newMsg.id, false);
    }

    // ── INCOMING MESSAGE FROM OTHER USER ──
    if (msg.type === 'receive_message') {
      const newMsg = { id: msg.id || Date.now(), chat_id: msg.chat_id, sender: msg.sender, content: msg.content, sent_at: msg.sent_at };
      if (activeChat && activeChat.chat_id === msg.chat_id) {
        activeChat.messages.push(newMsg);
        renderMessages(true);
        // Chat is open — immediately mark as read
        sendReadReceipt(msg.chat_id, newMsg.id);
      }
      upsertSidebarEntry(msg.chat_id, msg.sender, msg.sender, msg.content, msg.sent_at, newMsg.id, true);
    }

    // ── READ RECEIPT CONFIRMED (fires on all tabs for the same user) ──
    if (msg.type === 'updated_read_receipt') {
      if (sidebarMap.has(msg.chat_id)) {
        sidebarMap.get(msg.chat_id).unread_count = 0;
        renderSidebar();
      }
    }

    // ── REQUESTS ──
    if (msg.type === 'request_receive') {
      requestCount++;
      updateRequestBadge(requestCount);
      const modalOpen = document.getElementById('requests-modal').classList.contains('open');
      if (modalOpen && activeReqTab === 'incoming') switchReqTab('incoming');
    }

    if (msg.type === 'request_send') {
      if (msg.reason === 'success') {
        showReqFeedback('Request sent!', true);
        const modalOpen = document.getElementById('requests-modal').classList.contains('open');
        if (modalOpen && activeReqTab === 'outgoing') switchReqTab('outgoing');
      } else if (msg.reason === 'request_exists') showReqFeedback('Request already sent', false);
      else if (msg.reason === 'already_friend')   showReqFeedback('Already friends', false);
      else if (msg.reason === 'user_no_exist')    showReqFeedback('User not found', false);
      else if (msg.reason === 'request_from_user_exists') showReqFeedback('This user already sent you a request', false);
    }

    if (msg.type === 'request') {
      const modalOpen = document.getElementById('requests-modal').classList.contains('open');
      if (msg.status === 'accepted') {
        showToast(`${msg.username} accepted your request!`);
        if (modalOpen && activeReqTab === 'outgoing') switchReqTab('outgoing');
        // Reload sidebar so new friend appears
        sidebarAllLoaded = false;
        sidebarOldestId = 999999999;
        sidebarMap.clear();
        loadSidebar();
      } else if (msg.status === 'rejected') {
        showToast(`${msg.username} declined your request`, true);
        if (modalOpen && activeReqTab === 'outgoing') switchReqTab('outgoing');
      }
    }

    if (msg.type === 'request_takeback') {
      if (!msg.req_detail) return;
      const [id, username] = msg.req_detail;
      document.getElementById(`req-${id}`)?.remove();
      if (username !== currentUsername) {
        requestCount = Math.max(0, requestCount - 1);
        updateRequestBadge(requestCount);
      }
      if (!document.querySelectorAll('#requests-list .request-item').length) {
        document.getElementById('requests-list').innerHTML =
          `<div class="empty-requests">No ${activeReqTab} requests</div>`;
      }
    }
  };

  ws.onclose = () => setTimeout(() => connectWebSocket(token), 3000);
}

// ── PROFILE ──
async function openProfile() {
  const res = await fetch(`${API}/me`,{credentials:'include'});
  if (!res.ok) return;
  const data = await res.json();

  document.getElementById('profile-name-display').textContent = data.username;
  document.getElementById('profile-email-display').textContent = formatJoinDate(data.creation_date);
  document.getElementById('profile-username').value = data.username;
  document.getElementById('profile-email').value = data.email;
  document.getElementById('profile-about').value = data.about ?? '';
  document.getElementById('profile-avatar-lg').childNodes[0].textContent = data.username.slice(0, 2).toUpperCase();
  originalAbout = data.about ?? '';

  document.getElementById('profile-modal').classList.add('open');
}

document.getElementById('profile-about').addEventListener('input', function () {
  const changed = this.value.trim() !== originalAbout.trim();
  const btn = document.getElementById('save-btn');
  btn.disabled = !changed;
  btn.style.opacity = changed ? '1' : '0.45';
  btn.style.cursor = changed ? 'pointer' : 'not-allowed';
});

function formatJoinDate(dateStr) {
  return 'Joined on ' + new Date(dateStr).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

async function saveProfile() {
  const about = document.getElementById('profile-about').value.trim();
  const res = await fetch(`${API}/update_about`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ about }),
    credentials:'include'
  });
  if (!res.ok) return;
  originalAbout = about;
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.style.opacity = '0.45'; btn.style.cursor = 'not-allowed';
  closeModal('profile-modal');
  showToast('Profile saved');
}

// ── LOGOUT ──
async function logout() {
  // const token = localStorage.getItem('token');
  await fetch(`${API}/logout`,{credentials:'include'});
  // localStorage.removeItem('token');
  window.location.href = './index.html';
}

// ── REQUESTS ──
async function openRequests() {
  document.getElementById('requests-modal').classList.add('open');
  requestCount = 0;
  updateRequestBadge(0);
  switchReqTab('incoming');
}

async function switchReqTab(tab) {
  activeReqTab = tab;
  document.getElementById('tab-incoming').classList.toggle('active', tab === 'incoming');
  document.getElementById('tab-outgoing').classList.toggle('active', tab === 'outgoing');
  // const token = localStorage.getItem('token');
  const endpoint = tab === 'incoming' ? 'requests_list' : 'requests_list_outgoing';
  const res = await fetch(`${API}/${endpoint}`,{credentials:'include'});
  const data = await res.json();
  renderRequests(data, tab);
}

function renderRequests(data, tab) {
  const list = document.getElementById('requests-list');
  if (!data || !data.length) { list.innerHTML = `<div class="empty-requests">No ${tab} requests</div>`; return; }
  list.innerHTML = data.map((r, i) => {
    const [bg, fg] = avatarColors[i % avatarColors.length];
    const displayName = r[1];
    const date = 'Sent on ' + new Date(r[2]).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    return `
    <div class="request-item" id="req-${r[0]}">
      <div class="request-avatar" style="background:${bg}20;color:${fg}">${displayName.slice(0, 2).toUpperCase()}</div>
      <div class="request-info">
        <div class="request-name">${escapeHtml(displayName)}</div>
        <div class="request-meta">${date}</div>
      </div>
      <div class="request-btns">
        ${tab === 'incoming' ? `
          <button class="req-accept" onclick="acceptReq(${r[0]}, '${displayName}')">Accept</button>
          <button class="req-decline" onclick="declineReq(${r[0]}, '${displayName}')">Decline</button>
        ` : `
          <button class="req-decline" onclick="takebackReq(${r[0]}, '${displayName}')">Cancel</button>
        `}
      </div>
    </div>`;
  }).join('');
}

function acceptReq(id, senderUsername) {
  ws.send(JSON.stringify({ type: 'request', id, username: senderUsername, status: 'accept' }));
  document.getElementById(`req-${id}`)?.remove();
  requestCount = Math.max(0, requestCount - 1);
  updateRequestBadge(requestCount);
  if (!document.querySelectorAll('#requests-list .request-item').length)
    document.getElementById('requests-list').innerHTML = `<div class="empty-requests">No incoming requests</div>`;
}

function declineReq(id, username) {
  ws.send(JSON.stringify({ type: 'request', id, username, status: 'decline' }));
  document.getElementById(`req-${id}`)?.remove();
  requestCount = Math.max(0, requestCount - 1);
  updateRequestBadge(requestCount);
  if (!document.querySelectorAll('#requests-list .request-item').length)
    document.getElementById('requests-list').innerHTML = `<div class="empty-requests">No ${activeReqTab} requests</div>`;
}

function takebackReq(id, username) {
  ws.send(JSON.stringify({ type: 'request_takeback', id, username }));
  document.getElementById(`req-${id}`)?.remove();
  if (!document.querySelectorAll('#requests-list .request-item').length)
    document.getElementById('requests-list').innerHTML = `<div class="empty-requests">No ${activeReqTab} requests</div>`;
}

function sendRequest() {
  const input = document.getElementById('send-req-input');
  const username = input.value.trim();
  if (!username || !ws) return;
  ws.send(JSON.stringify({ type: 'request_send', username }));
}

function showReqFeedback(msg, ok) {
  const fb = document.getElementById('send-req-feedback');
  const input = document.getElementById('send-req-input');
  fb.textContent = msg;
  fb.style.display = 'block';
  fb.style.color = ok ? 'var(--success)' : 'var(--danger)';
  input.style.borderColor = ok ? 'rgba(76,175,138,0.5)' : 'rgba(224,92,92,0.5)';
  setTimeout(() => {
    fb.style.display = 'none';
    input.style.borderColor = '';
    if (ok) input.value = '';
  }, 3000);
}

// ── BADGE ──
function updateRequestBadge(count) {
  const badge = document.getElementById('nav-badge');
  if (count > 0) {
    badge.textContent = count > 99 ? '99+' : count;
    badge.style.cssText = `display:unset;width:auto;min-width:16px;height:16px;border-radius:8px;font-size:9px;font-weight:600;color:#fff;padding:0 4px;top:4px;right:4px;background:var(--danger);border:2px solid var(--surface);position:absolute;`;
  } else {
    badge.textContent = '';
    badge.style.cssText = `display:none;`;
  }
}

// ── SIDEBAR SEARCH ──
let sidebarSearchTimer = null;

function onSidebarSearch(value) {
  clearTimeout(sidebarSearchTimer);
  const q = value.trim();

  if (!q) {
    // Restore normal sidebar
    document.querySelector('.sidebar-section-label').textContent = 'Recent';
    renderSidebar();
    return;
  }

  // Debounce 300ms then hit API
  sidebarSearchTimer = setTimeout(async () => {
    // const token = localStorage.getItem('token');
    const res = await fetch(`${API}/search_sidebar/${encodeURIComponent(q)}`,{credentials:'include'});
    if (!res.ok) return;
    const results = await res.json(); // [[username], ...]

    const label = document.querySelector('.sidebar-section-label');
    label.textContent = 'Results';

    const list = document.getElementById('contact-list');
    if (!results || !results.length) {
      list.innerHTML = `<div style="padding:24px 12px;text-align:center;color:var(--text-dim);font-size:13px">No users found</div>`;
      return;
    }

    list.innerHTML = results.map(r => {
      const username = r[0];
      const colorIdx = getColorIdx(username);
      const [bg, fg] = avatarColors[colorIdx];
      const existing = [...sidebarMap.values()].find(e => e.username === username);
      const chat_id = existing ? existing.chat_id : null;
      const isActive = activeChat && existing && activeChat.chat_id === existing.chat_id;
      return `
      <div class="contact-item search-result-item${isActive ? ' active' : ''}"
           onclick="${chat_id ? `openChat('${chat_id}')` : ''}">
        <div class="contact-avatar" style="background:${bg}20;color:${fg}">${initials(username)}</div>
        <div class="contact-info">
          <div class="contact-name">${escapeHtml(username)}</div>
        </div>
      </div>`;
    }).join('');
  }, 300);
}

// ── CHAT SEARCH ──
let chatSearchResults = []; // [{id, sender, content, sent_at}]
let chatSearchIdx = 0;
let chatSearchTimer = null;
let chatSearchOldestId = 999999999;

function toggleChatSearch() {
  if (!activeChat) return;
  const bar = document.getElementById('chat-search-bar');
  const isVisible = bar.classList.contains('visible');
  if (isVisible) {
    closeChatSearch();
  } else {
    bar.classList.add('visible');
    document.getElementById('chat-search-input').focus();
  }
}

function closeChatSearch() {
  document.getElementById('chat-search-bar').classList.remove('visible');
  document.getElementById('chat-search-input').value = '';
  document.getElementById('chat-search-count').textContent = '';
  chatSearchResults = [];
  chatSearchIdx = 0;
  chatSearchOldestId = 999999999;
  // Remove highlights
  document.querySelectorAll('.msg-row.search-match').forEach(el => el.classList.remove('search-match'));
}

function onChatSearch(value) {
  clearTimeout(chatSearchTimer);
  const q = value.trim();
  if (!q) {
    document.getElementById('chat-search-count').textContent = '';
    chatSearchResults = [];
    document.querySelectorAll('.msg-row.search-match').forEach(el => el.classList.remove('search-match'));
    return;
  }
  chatSearchTimer = setTimeout(() => runChatSearch(q), 350);
}

async function runChatSearch(q) {
  if (!activeChat) return;
  chatSearchOldestId = 999999999;
  chatSearchResults = [];
  chatSearchIdx = 0;

  // const token = localStorage.getItem('token');
  const res = await fetch(`${API}/search_chat/${activeChat.chat_id}/${encodeURIComponent(q)}/${chatSearchOldestId}`,{credentials:'include'});
  if (!res.ok) return;
  const rows = await res.json();
  // rows: [id, sender, content, sent_at]
  if (!rows || !rows.length) {
    document.getElementById('chat-search-count').textContent = 'No results';
    return;
  }

  // Results come back DESC (newest first) — keep that order for navigation
  chatSearchResults = rows.map(r => ({ id: r[0], sender: r[1], content: r[2], sent_at: r[3] }));
  chatSearchIdx = 0;
  updateChatSearchCount();
  scrollToSearchResult(chatSearchIdx);
}

function chatSearchStep(dir) {
  if (!chatSearchResults.length) return;
  chatSearchIdx = (chatSearchIdx + dir + chatSearchResults.length) % chatSearchResults.length;
  updateChatSearchCount();
  scrollToSearchResult(chatSearchIdx);
}

function chatSearchKey(e) {
  if (e.key === 'Enter') { e.shiftKey ? chatSearchStep(-1) : chatSearchStep(1); }
  if (e.key === 'Escape') closeChatSearch();
}

function updateChatSearchCount() {
  const count = chatSearchResults.length;
  document.getElementById('chat-search-count').textContent =
    count ? `${chatSearchIdx + 1} / ${count}` : 'No results';
}

function scrollToSearchResult(idx) {
  const match = chatSearchResults[idx];
  if (!match) return;

  document.querySelectorAll('.msg-row.search-match').forEach(el => el.classList.remove('search-match'));

  // Already in DOM — just highlight and scroll
  const el = document.querySelector(`.msg-row[data-id="${match.id}"]`);
  if (el) {
    el.classList.add('search-match');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  // Not in DOM — jump to that point in history
  jumpToMessage(match);
}

async function jumpToMessage(match) {
  if (!activeChat) return;
  // const token = localStorage.getItem('token');
  const { chat_id } = activeChat;

  // Fetch 50 messages before and 50 after in parallel
  const [beforeRes, afterRes] = await Promise.all([
    fetch(`${API}/load_chat/${match.id + 1}/${chat_id}`,{credentials:'include'}),
    fetch(`${API}/load_chat_after/${match.id - 1}/${chat_id}`,{credentials:'include'})
  ]);
  const beforeRows = await beforeRes.json();
  const afterRows = await afterRes.json();

  const before = (beforeRows || [])
    .map(r => ({ id: r[0], chat_id: r[1], sender: r[2], content: r[3], sent_at: r[4] }))
    .reverse(); // load_chat returns DESC, reverse to chronological
  const after = (afterRows || [])
    .map(r => ({ id: r[0], chat_id: r[1], sender: r[2], content: r[3], sent_at: r[4] })); // load_chat_after returns ASC

  const matchMsg = { id: match.id, chat_id, sender: match.sender, content: match.content, sent_at: match.sent_at };

  // Replace the loaded message window with this slice
  activeChat.messages = [...before, matchMsg, ...after];
  activeChat.oldestId = before.length ? before[0].id : match.id;
  activeChat.hasMore = before.length >= 50;
  activeChat.hasNewer = after.length >= 50;

  renderMessages();

  setTimeout(() => {
    const target = document.querySelector(`.msg-row[data-id="${match.id}"]`);
    if (target) {
      target.classList.add('search-match');
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 50);
}

// Handle browser back/forward
window.addEventListener('popstate', (e) => {
  const chat_id = e.state?.chat_id;
  if (chat_id && sidebarMap.has(chat_id)) {
    openChat(chat_id);
  } else {
    // Back to no chat open
    activeChat = null;
    document.getElementById('chat-area').classList.remove('visible');
    document.getElementById('chat-area').style.display = 'none';
    document.getElementById('empty-state').style.display = '';
    renderSidebar();
  }
});

// ── UTILS ──
function setNav(btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

function showToast(msg, isDanger = false) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.toggle('danger', isDanger);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
